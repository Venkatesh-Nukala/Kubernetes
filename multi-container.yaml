apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
spec:
  containers:
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80
    volumeMounts:
    - name: shared-volume
      mountPath: /usr/share/nginx/html

  - name: alpine-sidecar
    image: alpine:latest
    command: ["/bin/sh", "-c"]
    args:
      - while true; do
          echo "Updated from Alpine Sidecar" > /data/index.html;
          sleep 5;
        done
    volumeMounts:
    - name: shared-volume
      mountPath: /data

  volumes:
  - name: shared-volume
    emptyDir: {}
